<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aNillerx — Personal Bio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0a0a, #111827, #1f2937);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 800px;
      margin: 60px auto;
      text-align: center;
    }

    /* HEADER */
    .profile-header {
      margin-bottom: 40px;
    }

    .logo-text {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #8b5cf6, #d8b4fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .username {
      font-size: 20px;
      color: #9ca3af;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* EXPERIENCE BLOCK (NEW) */
    .exp-card {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 30px;
      text-align: left;
    }

    .exp-card h3 {
      color: #a78bfa;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* PROJECTS SECTION */
    .section-title {
      font-size: 24px;
      margin: 40px 0 20px;
      color: #fff;
      text-align: left;
      border-left: 4px solid #7c3aed;
      padding-left: 15px;
    }

    .project-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      text-align: left;
      transition: 0.3s;
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .project-card:hover {
      background: rgba(124, 58, 237, 0.1);
      border-color: #7c3aed;
      transform: translateY(-5px);
    }

    .project-card h3 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #c4b5fd;
    }

    .project-card p {
      color: #d1d5db;
      font-size: 16px;
      line-height: 1.5;
    }

    /* LINKS SECTION */
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .social-link {
      padding: 15px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      transition: 0.2s;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: #f3f4f6;
    }

    .social-link:hover {
      background: #7c3aed;
      color: white;
      border-color: #7c3aed;
    }

    .discord-tag {
      cursor: default;
    }

    footer {
      margin-top: auto;
      padding: 40px;
      color: #4b5563;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .logo-text { font-size: 36px; }
      .container { margin: 30px auto; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="profile-header">
      <div class="logo-text">YoBio</div>
      <div class="username">aNillerx</div>
    </header>

    <div class="exp-card">
      <h3>⭐ Привет</h3>
      <p>Я <strong>Тимофей</strong>).</p>
    </div>

    <h2 class="section-title">Проекты на GitHub</h2>
    
    <a href="https://github.com/aNillerx/aiBox" target="_blank" class="project-card">
      <h3>aiBox</h3>
      <p>Форк KomaruFunbox. Просто убран мусор типо экономики и BFG.</p>
    </a>

    <a href="https://github.com/aNillerx/SimpleAi" target="_blank" class="project-card">
      <h3>Simple Ai</h3>
      <p>Простая и понятная реализация искусственного интеллекта.</p>
    </a>

    <h2 class="section-title">Контакты</h2>
    
    <div class="links-grid">
      <a href="https://t.me/nillerxs" target="_blank" class="social-link">✈️ Telegram</a>
      <a href="https://github.com/aNillerx" target="_blank" class="social-link">🐙 GitHub</a>
      <a href="mailto:askfornova@gmail.com" class="social-link">📧 Email</a>
    </div>
  </div>

  <footer>
    © 2026 • aNillerx
  </footer>

</body>
</html>
